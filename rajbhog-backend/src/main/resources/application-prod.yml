server:
  port: ${PORT:8080}

spring:
  application:
    name: rajbhog-backend

  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}

  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: update

    show-sql: false

    properties:
      hibernate:
        format_sql: false
        dialect: org.hibernate.dialect.PostgreSQLDialect

jwt:
  secret: ${JWT_SECRET}

brevo:
  api-key: ${BREVO_API_KEY}

springdoc:
  swagger-ui:
    path: /swagger-ui.html

  api-docs:
    path: /v3/api-docs

admin:
  email: ${ADMIN_EMAIL}
  name: Admin

rajbhog:
  store:
    latitude: 25.102699
    longitude: 84.123001
    delivery-radius-km: 10

razorpay:
  keyId: ${RAZORPAY_KEY}
  keySecret: ${RAZORPAY_SECRET}
