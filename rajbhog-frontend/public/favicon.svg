<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ff8c00"/>
      <stop offset="55%" stop-color="#ff5200"/>
      <stop offset="100%" stop-color="#e03400"/>
    </linearGradient>
    <radialGradient id="glow" cx="30%" cy="25%" r="55%">
      <stop offset="0%" stop-color="rgba(255,255,255,0.22)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
    </radialGradient>
  </defs>

  <!-- Rounded square background -->
  <rect width="32" height="32" rx="7" fill="url(#bg)"/>
  <rect width="32" height="32" rx="7" fill="url(#glow)"/>

  <!-- RB monogram -->
  <text x="16" y="19" font-family="Georgia, serif" font-size="16" font-weight="700" fill="white" opacity="0.97" letter-spacing="-0.5" text-anchor="middle">RB</text>

  <!-- Divider line -->
  <line x1="3" y1="22" x2="29" y2="22" stroke="rgba(255,220,140,0.50)" stroke-width="0.7" stroke-linecap="round" stroke-dasharray="2,2.5"/>

  <!-- RAJBHOG wordmark -->
  <!-- <text x="16" y="29" font-family="Arial, sans-serif" font-size="4.2" font-weight="700" fill="white" opacity="0.88" text-anchor="middle" letter-spacing="1.2">RAJBHOG</text> -->
</svg>